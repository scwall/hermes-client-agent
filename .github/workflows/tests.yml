name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --ignore=tests/test_linux_compat.py -k "not test_opencode_installed and not test_valid_config_parsed and not test_invalid_config_returns_error"
        timeout-minutes: 10

      - name: Lint with ruff
        if: always()
        run: uv run ruff check hermes_agent/ windows_control/
